<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor F1 — Monaco</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas"></canvas>

      <div id="hud" class="hidden">
        <div id="track-name">Circuit de Monaco</div>

        <div class="hud-top">
          <div class="stat"><span class="label">Pos</span><span id="position">P4</span></div>
          <div class="stat"><span class="label">Speed</span><span id="speed">0</span></div>
          <div class="stat"><span class="label">Lap</span><span id="lap">1/3</span></div>
          <div class="stat"><span class="label">Time</span><span id="time">0:00.000</span></div>
          <div class="stat"><span class="label">Best</span><span id="best">--:--.---</span></div>
          <div class="stat"><span class="label">Draft</span><span id="draft">0</span></div>
        </div>

        <canvas id="minimap" width="160" height="120"></canvas>

        <div id="leaderboard">
          <div class="lb-header">Standings</div>
          <ul id="lb-list"></ul>
        </div>

        <div id="countdown" class="hidden"></div>
        <div id="crash-flash" class="hidden"></div>
        <div id="start-prompt">Press ↑ when ready — use ← → through every corner</div>
      </div>

      <div id="lobby-backdrop">
        <div id="lobby-modal">
          <div class="lobby-brand">Cursor F1</div>
          <p class="lobby-sub">Circuit de Monaco</p>

          <label class="lobby-label" for="player-name">Driver name</label>
          <input id="player-name" type="text" maxlength="20" placeholder="Your name" autocomplete="nickname" />

          <label class="lobby-label" for="lap-count">Laps</label>
          <select id="lap-count">
            <option value="1">1 lap</option>
            <option value="2">2 laps</option>
            <option value="3" selected>3 laps</option>
            <option value="5">5 laps</option>
            <option value="10">10 laps</option>
          </select>

          <div class="mode-toggle">
            <button type="button" id="mode-bots" class="mode-btn active">Solo vs Bots</button>
            <button type="button" id="mode-friends" class="mode-btn">Friends Online</button>
          </div>

          <div id="bots-panel">
            <button type="button" id="play-bots" class="lobby-primary">Race</button>
          </div>

          <div id="friends-panel" class="hidden">
            <div class="friends-actions">
              <button type="button" id="create-room" class="lobby-secondary">Create Room</button>
              <div class="join-row">
                <input id="room-code" type="text" maxlength="6" placeholder="Room code" autocapitalize="characters" />
                <button type="button" id="join-room" class="lobby-secondary">Join</button>
              </div>
            </div>

            <div id="room-info" class="hidden">
              <div class="room-meta">
                <span class="room-label">Drivers</span>
                <ul id="player-list"></ul>
              </div>
              <label class="lobby-label" for="invite-link">Invite link</label>
              <div class="invite-row">
                <input id="invite-link" type="text" readonly />
                <button type="button" id="copy-link" class="lobby-secondary">Copy</button>
              </div>
              <button type="button" id="start-race" class="lobby-primary" disabled>Start Race</button>
              <p class="room-hint">Max 3 players · Start unlocks when a friend joins</p>
            </div>
          </div>

          <p id="lobby-status"></p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
